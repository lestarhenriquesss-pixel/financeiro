<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login</title>

    <link
        rel="stylesheet"
        href="./styles/main.css"
    >

    <style>

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #121214;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            background: #202024;
            border-radius: 12px;
        }

        .login-container h1 {
            color: white;
            margin-bottom: 2rem;
            text-align: center;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group input {
            width: 100%;
            height: 50px;
            padding: 0 1rem;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        button {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 1rem;
        }

        .register-button {
            background: #8257e5;
            color: white;
        }

        .login-button {
            background: #04d361;
            color: white;
        }

    </style>

</head>

<body>

    <div class="login-container">

        <h1>Casinha Financeira</h1>

        <div class="input-group">
            <input
                type="email"
                id="email"
                placeholder="Seu email"
            >
        </div>

        <div class="input-group">
            <input
                type="password"
                id="password"
                placeholder="Sua senha"
            >
        </div>

        <button
            class="login-button"
            onclick="login()"
        >
            Entrar
        </button>

        <button
            class="register-button"
            onclick="register()"
        >
            Criar Conta
        </button>

    </div>

    <script type="module">

        import {
            auth
        } from "./scripts/firebase.js"

        import {
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"

        async function register() {

            const email =
                document.querySelector("#email").value

            const password =
                document.querySelector("#password").value

            try {

                await createUserWithEmailAndPassword(
                    auth,
                    email,
                    password
                )

                alert("Conta criada!")

            } catch(error) {

                alert(error.message)

            }

        }

        async function login() {

            const email =
                document.querySelector("#email").value

            const password =
                document.querySelector("#password").value

            try {

                await signInWithEmailAndPassword(
                    auth,
                    email,
                    password
                )

                window.location.href =
                    "./index.html"

            } catch(error) {

                alert(error.message)

            }

        }

        window.login = login
        window.register = register

    </script>

</body>

</html>
